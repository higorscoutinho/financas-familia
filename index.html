<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Finanças Família</title>
<meta name="theme-color" content="#3D5AFE">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Finanças">
<link rel="stylesheet" href="css/style.css">
<script>
  // Aplica o tema salvo antes de qualquer render (evita flash)
  (function(){
    const t = localStorage.getItem("ff_theme_v1") || "light";
    document.documentElement.setAttribute("data-theme", t);
  })();
</script>
</head>
<body>

<!-- Tela de autenticação — conteúdo renderizado por auth.js -->
<div id="auth-screen">
  <!-- Estado de carregamento visível ANTES do JS — evita tela preta -->
  <div class="auth-card" style="text-align:center;">
    <div class="auth-logo" style="margin:0 auto 20px;">🔒</div>
    <h1 class="auth-title">Finanças Família</h1>
    <p class="auth-sub" style="margin-top:8px;">Carregando…</p>
  </div>
</div>

<!-- Aplicativo — oculto até autenticação -->
<div id="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark"
           style="width:28px;height:28px;border-radius:8px;
                  background:linear-gradient(135deg,var(--color-accent),#8AA0FF);
                  display:inline-block;flex-shrink:0;"></div>
      <span>Finanças Família</span>
    </div>
    <ul class="nav-list" id="nav-list"></ul>
    <div class="sidebar-footer">
      <button class="theme-toggle" id="theme-toggle-btn">🌗 Alternar tema</button>
      <button class="logout-btn" id="logout-btn">🔒 Bloquear</button>
    </div>
  </aside>

  <main class="main" id="main-content"></main>
  <button class="fab" id="fab-add" title="Adicionar (D = despesa, R = receita)">+</button>
  <nav class="bottom-nav" id="bottom-nav"></nav>
</div>

<div class="modal-backdrop" id="modal-backdrop"><div id="modal-root"></div></div>
<div class="more-menu-sheet" id="more-menu-sheet"><div class="more-menu-card" id="more-menu-card"></div></div>
<div class="toast-stack" id="toast-stack"></div>

<!-- ORDEM DOS SCRIPTS: config → utils → charts → api → auth → store → actions → modals → pages → app -->
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/charts.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/store.js"></script>
<script src="js/actions.js"></script>
<script src="js/modals.js"></script>
<script src="js/pages.js"></script>
<script src="js/app.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(()=>{}));
  }
</script>
</body>
</html>
